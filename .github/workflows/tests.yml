name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest

